<svg width="320" height="384" viewBox="0 0 320 384" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&amp;display=swap');</style>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="glowTop" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="card">
      <rect width="320" height="384" rx="20"/>
    </clipPath>
    <clipPath id="browser">
      <rect x="16" y="16" width="288" height="216" rx="10"/>
    </clipPath>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
  </defs>

  <g clip-path="url(#card)">

    <!-- Card background -->
    <rect width="320" height="384" fill="url(#cardBg)"/>

    <!-- Green top glow -->
    <ellipse cx="160" cy="20" rx="160" ry="80" fill="url(#glowTop)"/>

    <!-- ── BROWSER FRAME ── -->
    <rect x="16" y="16" width="288" height="216" rx="10" fill="#111C2D" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

    <!-- Browser top bar -->
    <rect x="16" y="16" width="288" height="28" rx="10" fill="#1E2D40"/>
    <rect x="16" y="34" width="288" height="10" fill="#1E2D40"/>

    <!-- Traffic lights -->
    <circle cx="32" cy="30" r="4" fill="#FC8181"/>
    <circle cx="46" cy="30" r="4" fill="#F6E05E"/>
    <circle cx="60" cy="30" r="4" fill="#68D391"/>

    <!-- URL bar -->
    <rect x="96" y="23" width="128" height="14" rx="7" fill="rgba(255,255,255,0.07)"/>
    <text x="160" y="33" font-size="5.5" fill="rgba(255,255,255,0.3)" font-family="sans-serif" text-anchor="middle">my-uxassistant.vercel.app</text>

    <!-- ── BROWSER CONTENT ── -->
    <!-- Left panel -->
    <rect x="16" y="44" width="142" height="188" fill="#0D1B2A"/>

    <!-- Right panel -->
    <rect x="158" y="44" width="146" height="188" fill="#111E2E"/>

    <!-- Divider -->
    <line x1="158" y1="44" x2="158" y2="232" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

    <!-- LEFT: Title -->
    <text x="24" y="62" font-family="Poppins, sans-serif" font-size="7" font-weight="700" fill="#F1F5F9">UX Feedback <tspan fill="#10B981">Assistant</tspan></text>

    <!-- LEFT: Input tabs -->
    <rect x="22" y="68" width="128" height="16" rx="8" fill="rgba(255,255,255,0.04)"/>
    <rect x="24" y="70" width="38" height="12" rx="6" fill="rgba(255,255,255,0.04)"/>
    <text x="43" y="79" font-size="5" fill="rgba(255,255,255,0.35)" font-family="sans-serif" text-anchor="middle">Text</text>
    <rect x="65" y="70" width="42" height="12" rx="6" fill="rgba(16,185,129,0.15)" stroke="#10B981" stroke-width="0.5"/>
    <text x="86" y="79" font-size="5" fill="#10B981" font-family="sans-serif" text-anchor="middle" font-weight="600">Upload</text>
    <rect x="110" y="70" width="38" height="12" rx="6" fill="rgba(255,255,255,0.04)"/>
    <text x="129" y="79" font-size="5" fill="rgba(255,255,255,0.35)" font-family="sans-serif" text-anchor="middle">URL</text>

    <!-- LEFT: Description lines -->
    <rect x="22" y="90" width="112" height="3.5" rx="2" fill="rgba(255,255,255,0.09)"/>
    <rect x="22" y="97" width="88" height="3.5" rx="2" fill="rgba(255,255,255,0.06)"/>

    <!-- LEFT: Focus label -->
    <text x="22" y="112" font-size="4.5" fill="rgba(255,255,255,0.28)" font-family="sans-serif" letter-spacing="0.5">FOCUS FEEDBACK ON</text>

    <!-- LEFT: Checkboxes -->
    <rect x="22" y="116" width="128" height="14" rx="4" fill="rgba(16,185,129,0.1)" stroke="#10B981" stroke-width="0.5"/>
    <rect x="26" y="120" width="6" height="6" rx="1" fill="#10B981"/>
    <text x="36" y="126" font-size="6" fill="#10B981" font-family="sans-serif" font-weight="600">Usability</text>

    <rect x="22" y="133" width="128" height="14" rx="4" fill="rgba(16,185,129,0.1)" stroke="#10B981" stroke-width="0.5"/>
    <rect x="26" y="137" width="6" height="6" rx="1" fill="#10B981"/>
    <text x="36" y="143" font-size="6" fill="#10B981" font-family="sans-serif" font-weight="600">Visual Hierarchy</text>

    <rect x="22" y="150" width="128" height="14" rx="4" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
    <rect x="26" y="154" width="6" height="6" rx="1" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <text x="36" y="160" font-size="6" fill="rgba(255,255,255,0.35)" font-family="sans-serif">Accessibility</text>

    <rect x="22" y="167" width="128" height="14" rx="4" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
    <rect x="26" y="171" width="6" height="6" rx="1" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    <text x="36" y="177" font-size="6" fill="rgba(255,255,255,0.35)" font-family="sans-serif">Copy &amp; Messaging</text>

    <!-- LEFT: Analyze button -->
    <rect x="22" y="198" width="128" height="22" rx="6" fill="#10B981"/>
    <text x="86" y="213" font-size="7" fill="white" font-family="sans-serif" font-weight="700" text-anchor="middle">Analyze Design →</text>

    <!-- RIGHT: Header labels -->
    <text x="165" y="57" font-size="5" fill="rgba(255,255,255,0.3)" font-family="sans-serif" letter-spacing="0.4">FEEDBACK RESULTS</text>
    <text x="296" y="57" font-size="5" fill="#10B981" font-family="sans-serif" text-anchor="end">just now</text>

    <!-- RIGHT: Score label -->
    <text x="165" y="70" font-size="5" fill="rgba(255,255,255,0.3)" font-family="sans-serif" letter-spacing="0.4">OVERALL UX SCORE</text>

    <!-- RIGHT: Big score -->
    <text x="165" y="94" font-family="Poppins, sans-serif" font-size="30" font-weight="800" fill="#F1F5F9">6.7</text>
    <text x="200" y="90" font-size="12" fill="rgba(255,255,255,0.25)" font-family="sans-serif">/10</text>

    <!-- RIGHT: Badge -->
    <rect x="214" y="77" width="70" height="13" rx="6.5" fill="rgba(251,146,60,0.18)"/>
    <text x="249" y="87" font-size="5" fill="#FB923C" font-family="sans-serif" text-anchor="middle">Needs improvement</text>

    <!-- RIGHT: Dimension boxes -->
    <rect x="163" y="100" width="40" height="28" rx="5" fill="rgba(255,255,255,0.05)"/>
    <text x="183" y="113" font-family="Poppins, sans-serif" font-size="11" font-weight="700" fill="#F1F5F9" text-anchor="middle">7</text>
    <text x="183" y="122" font-size="4.5" fill="rgba(255,255,255,0.3)" font-family="sans-serif" text-anchor="middle">USABILITY</text>

    <rect x="207" y="100" width="40" height="28" rx="5" fill="rgba(255,255,255,0.05)"/>
    <text x="227" y="113" font-family="Poppins, sans-serif" font-size="11" font-weight="700" fill="#F1F5F9" text-anchor="middle">8</text>
    <text x="227" y="122" font-size="4.5" fill="rgba(255,255,255,0.3)" font-family="sans-serif" text-anchor="middle">VISUAL H.</text>

    <rect x="251" y="100" width="40" height="28" rx="5" fill="rgba(16,185,129,0.12)" stroke="#10B981" stroke-width="0.5"/>
    <text x="271" y="113" font-family="Poppins, sans-serif" font-size="11" font-weight="700" fill="#10B981" text-anchor="middle">5</text>
    <text x="271" y="122" font-size="4.5" fill="#10B981" font-family="sans-serif" text-anchor="middle">ACCESS.</text>

    <!-- RIGHT: What's working panel -->
    <rect x="163" y="133" width="139" height="86" rx="6" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
    <rect x="163" y="133" width="139" height="16" rx="6" fill="rgba(255,255,255,0.04)"/>
    <rect x="163" y="143" width="139" height="6" fill="rgba(255,255,255,0.04)"/>
    <text x="170" y="144" font-size="5" fill="#10B981" font-family="sans-serif" font-weight="700">✓  WHAT'S WORKING</text>
    <text x="294" y="144" font-size="5" fill="rgba(255,255,255,0.25)" font-family="sans-serif" text-anchor="end">3 obs.</text>

    <circle cx="169" cy="159" r="2" fill="#10B981"/>
    <text x="175" y="162" font-size="5.5" fill="rgba(255,255,255,0.75)" font-family="sans-serif" font-weight="600">Readable font sizes</text>
    <text x="175" y="170" font-size="4.5" fill="rgba(255,255,255,0.3)" font-family="sans-serif">Meets WCAG 2.1 SC 3.1.5</text>

    <circle cx="169" cy="181" r="2" fill="#10B981"/>
    <text x="175" y="184" font-size="5.5" fill="rgba(255,255,255,0.75)" font-family="sans-serif" font-weight="600">Strong semantic contrast</text>
    <text x="175" y="192" font-size="4.5" fill="rgba(255,255,255,0.3)" font-family="sans-serif">Passes WCAG 2.1 SC 1.4.3</text>

    <circle cx="169" cy="203" r="2" fill="#10B981"/>
    <text x="175" y="206" font-size="5.5" fill="rgba(255,255,255,0.75)" font-family="sans-serif" font-weight="600">Clear visual separation</text>
    <text x="175" y="214" font-size="4.5" fill="rgba(255,255,255,0.3)" font-family="sans-serif">Supports cognitive a11y needs</text>

    <!-- ── BOTTOM TEXT ── -->
    <!-- Category badge -->
    <rect x="121" y="246" width="78" height="14" rx="7" fill="rgba(16,185,129,0.12)" stroke="rgba(16,185,129,0.25)" stroke-width="0.5"/>
    <text x="160" y="256" font-size="6" fill="#10B981" font-family="sans-serif" text-anchor="middle">AI Product · Live</text>

    <!-- Title -->
    <text x="160" y="279" font-family="Poppins, sans-serif" font-size="15" font-weight="800" fill="#F1F5F9" text-anchor="middle">UX Feedback Assistant</text>

    <!-- Description -->
    <text x="160" y="298" font-size="7" fill="rgba(148,163,184,0.85)" font-family="sans-serif" text-anchor="middle">AI-powered design critique grounded</text>
    <text x="160" y="309" font-size="7" fill="rgba(148,163,184,0.85)" font-family="sans-serif" text-anchor="middle">in 50+ published UX principles</text>

    <!-- Divider -->
    <line x1="100" y1="325" x2="220" y2="325" stroke="rgba(16,185,129,0.15)" stroke-width="0.5"/>

    <!-- Stack pills -->
    <rect x="78" y="333" width="34" height="12" rx="6" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
    <text x="95" y="342" font-size="5" fill="rgba(255,255,255,0.45)" font-family="sans-serif" text-anchor="middle">React</text>

    <rect x="116" y="333" width="40" height="12" rx="6" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
    <text x="136" y="342" font-size="5" fill="rgba(255,255,255,0.45)" font-family="sans-serif" text-anchor="middle">Tailwind</text>

    <rect x="160" y="333" width="36" height="12" rx="6" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
    <text x="178" y="342" font-size="5" fill="rgba(255,255,255,0.45)" font-family="sans-serif" text-anchor="middle">Vercel</text>

    <rect x="200" y="333" width="42" height="12" rx="6" fill="rgba(16,185,129,0.08)" stroke="rgba(16,185,129,0.2)" stroke-width="0.5"/>
    <text x="221" y="342" font-size="5" fill="#10B981" font-family="sans-serif" text-anchor="middle">Claude API</text>

    <!-- Live indicator -->
    <circle cx="143" cy="362" r="3" fill="#10B981"/>
    <circle cx="143" cy="362" r="3" fill="#10B981" fill-opacity="0.3">
      <animate attributeName="r" from="3" to="7" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="fill-opacity" from="0.3" to="0" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <text x="150" y="366" font-size="6.5" fill="rgba(255,255,255,0.45)" font-family="sans-serif">Live on Vercel</text>

  </g>
</svg>
